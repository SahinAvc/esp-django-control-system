<body>
<div class="container" style="width: 50%; padding: 100px;">
        <h2>Araba Kontrol Paneli</h2>

    <button onclick="komutGonder('ileri')">İleri</button>
    <button onclick="komutGonder('geri')">Geri</button>
    <button onclick="komutGonder('dur')">Dur</button>
</div>
<script>
function komutGonder(komut){
    fetch("/" + komut + "/")
        .then(res => res.json())
        .then(data => console.log(data));
}
</script>
